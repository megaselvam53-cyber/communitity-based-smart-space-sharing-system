<!doctype html>
<html>
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Booking Success</title>
  <link rel="stylesheet" href="style.css"/>
  <style>
    .tick{
      width:90px;height:90px;border-radius:50%;
      display:flex;align-items:center;justify-content:center;
      margin:14px auto;
      background:rgba(34,197,94,.15);
      font-size:48px;
    }
    .center{text-align:center;}
  </style>
</head>
<body>
  
  <video class="bg-video" autoplay muted loop playsinline>
  <source src="assets/bg.mp4" type="video/mp4">
</video>
  <div class="page-bg">
    <div class="card-box center">
      <div class="title">Thanks for Booking ✅</div>
      <div class="tick">✔</div>

      <div id="info" style="opacity:.9;"></div>

      <button class="btn btn-primary" style="margin-top:12px;"
        onclick="location.href='user_dashboard.html'">
        Go to Dashboard
      </button>

      <button class="btn linkbtn" style="margin-top:10px;"
        onclick="location.href='user_bookings.html'">
        View My Bookings
      </button>
    </div>
  </div>

<script>
  const bookings = JSON.parse(localStorage.getItem("userBookings") || "[]");
  const lastId = localStorage.getItem("lastBookingId");
  const last = bookings.find(b => b.bookingId === lastId) || bookings[bookings.length-1];
  const info = document.getElementById("info");

  if(last){
    info.innerHTML = `
      <div><b>Spot:</b> ${last.title}</div>
      <div><b>Owner:</b> ${last.ownerName}</div>
      <div><b>Date:</b> ${last.date}</div>
      <div><b>Vehicle:</b> ${last.vehicle}</div>
      <div><b>Rate:</b> ₹${last.rate}/hour</div>
    `;
  } else {
    info.textContent = "Booking saved.";
  }
</script>
</body>
</html>
