<!doctype html>
<html>
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Generate OTP</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  
  <video class="bg-video" autoplay muted loop playsinline>
  <source src="assets/bg.mp4" type="video/mp4">
</video>
  <div class="page-bg">
    <div class="card-box">
      <div class="title">Generate OTP</div>
      <div class="subtitle">Demo: OTP shown here (SMS integration later)</div>

      <div class="section">
        <label>Select Booking (latest)</label>
        <select id="bookingSelect"></select>

        <button class="btn btn-primary" id="genBtn">Generate OTP</button>
        <p id="otpInfo" style="margin-top:10px;font-weight:800;"></p>

        <label>Enter OTP</label>
        <input id="otpInput" maxlength="4" placeholder="4-digit OTP">

        <button class="btn btn-secondary" id="verifyBtn">Verify</button>

        <div id="result" class="msg"></div>
        <div id="tick" style="display:none;text-align:center;font-size:70px;color:#16a34a;font-weight:900;">✓</div>
      </div>

      <button class="btn linkbtn" onclick="location.href='owner_dashboard.html'">Back</button>
    </div>
  </div>

  <script>
    // ================= LOAD BOOKINGS =================
const bookings = JSON.parse(localStorage.getItem("userBookings") || "[]").slice().reverse();
const sel = document.getElementById("bookingSelect");

if(bookings.length === 0){
  sel.innerHTML = `<option value="">No bookings</option>`;
  document.getElementById("genBtn").disabled = true;
  document.getElementById("verifyBtn").disabled = true;
} else {
  bookings.forEach(b=>{
    const opt = document.createElement("option");
    opt.value = b.bookingId;
    opt.textContent = `${b.ownerName || "User"} - ${b.title} (${b.date})`;
    sel.appendChild(opt);
  });
}

// ================= HELPERS =================
function getOTPMap(){
  return JSON.parse(localStorage.getItem("bookingOTPMap") || "{}");
}

function saveOTPMap(m){
  localStorage.setItem("bookingOTPMap", JSON.stringify(m));
}

// ================= GENERATE OTP =================
document.getElementById("genBtn").addEventListener("click", ()=>{
  const bookingId = sel.value;
  const booking = bookings.find(b=>b.bookingId===bookingId);

  if(!booking){
    alert("Select booking first");
    return;
  }

  const otp = Math.floor(1000 + Math.random()*9000);

  let otpMap = getOTPMap();
  otpMap[bookingId] = {
    code: otp,
    time: Date.now()
  };
  saveOTPMap(otpMap);

  document.getElementById("otpInfo").textContent =
    `OTP = ${otp} (Valid 2 minutes)`;

  document.getElementById("result").textContent = "";
  document.getElementById("tick").style.display = "none";
  document.getElementById("otpInput").value = "";
});

// ================= VERIFY OTP =================
document.getElementById("verifyBtn").addEventListener("click", ()=>{
  const entered = document.getElementById("otpInput").value.trim();
  const res = document.getElementById("result");
  const tick = document.getElementById("tick");

  tick.style.display = "none";

  const bookingId = sel.value;

  if(!bookingId){
    res.textContent = "Select booking first ❌";
    return;
  }

  let otpMap = getOTPMap();
  const data = otpMap[bookingId];

  if(!data){
    res.textContent = "OTP Expired ❌";
    return;
  }

  // ⏰ expiry (2 mins)
  if(Date.now() - data.time > 2 * 60 * 1000){
    res.textContent = "OTP Expired ⏳";
    delete otpMap[bookingId];
    saveOTPMap(otpMap);
    return;
  }

  if(entered === String(data.code)){

    let allBookings = JSON.parse(localStorage.getItem("userBookings") || "[]");
    const i = allBookings.findIndex(b => b.bookingId == bookingId);

    if(i !== -1){

      if(allBookings[i].status === "STARTED"){
        res.textContent = "Already Started ❌";
        return;
      }

      allBookings[i].status = "STARTED";
      allBookings[i].startTime = new Date().toLocaleTimeString();

      localStorage.setItem("userBookings", JSON.stringify(allBookings));
    }

    delete otpMap[bookingId];
    saveOTPMap(otpMap);

    res.textContent = "Matched ✅ Parking Started";
    tick.style.display = "block";

  } else {
    res.textContent = "Not Match ❌";
  }
});
  </script>
</body>
</html>
