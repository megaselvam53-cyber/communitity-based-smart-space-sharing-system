<!doctype html>
<html>
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Select Role</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <video class="bg-video" autoplay muted loop playsinline>
  <source src="assets/bg.mp4" type="video/mp4">
</video>
  <div class="page-bg">
    <div class="card-box">
      <div class="title">Select Role</div>
      <div class="subtitle">Choose one to continue</div>

      <div class="grid">
        <div class="section">
          
          <button class="btn btn-primary" id="userBtn">USER</button>
        </div>

        <div class="section">
          
          <button class="btn btn-primary" id="ownerBtn">OWNER</button>
        </div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
